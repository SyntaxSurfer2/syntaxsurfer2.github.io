<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Coming Soon | dr.k</title>
<style>
    /* Reset */
    * {
        margin: 0; padding: 0; box-sizing: border-box;
    }

    /* Background gradient with subtle animation */
    body, html {
        height: 100%;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
        background-size: 600% 600%;
        animation: bgShift 20s ease infinite;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #fff;
        text-align: center;
        padding: 20px;
    }

    @keyframes bgShift {
        0% {background-position:0% 50%;}
        50% {background-position:100% 50%;}
        100% {background-position:0% 50%;}
    }

    /* Container */
    .container {
        max-width: 800px;
        width: 100%;
        background: rgba(0,0,0,0.4);
        border-radius: 15px;
        padding: 40px 30px;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    /* Stars */
    .stars {
        font-size: 3.5rem;
        color: #f4d35e;
        margin-bottom: 20px;
        animation: twinkle 3s ease-in-out infinite alternate;
        user-select: none;
    }

    @keyframes twinkle {
        0%, 100% {opacity: 1;}
        50% {opacity: 0.5;}
    }

    /* Heading */
    h1 {
        font-size: clamp(3rem, 8vw, 6rem);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        text-shadow:
          0 0 5px #f4d35e,
          0 0 10px #f4d35e,
          0 0 20px #f4d35e,
          0 0 40px #f4d35e;
        margin-bottom: 10px;
    }

    /* Subtitle */
    p {
        font-size: clamp(1.2rem, 3vw, 2rem);
        color: #e0e0e0;
        margin-bottom: 40px;
        font-weight: 500;
    }

    /* Signature */
    footer {
        font-size: 1rem;
        font-style: italic;
        color: #f4d35e;
        letter-spacing: 0.15em;
        user-select: none;
        margin-top: 20px;
        opacity: 0.8;
        transition: opacity 0.3s ease;
        cursor: default;
    }
    footer:hover {
        opacity: 1;
    }

    /* Responsive */
    @media (max-width: 600px) {
        h1 {
            font-size: 4rem;
        }
        p {
            font-size: 1rem;
        }
        .stars {
            font-size: 2.5rem;
        }
    }
</style>
</head>
<body>
    <div class="container" role="main" aria-label="Coming Soon Announcement">
        <div class="stars" aria-hidden="true">🌟🌟🌟</div>
        <h1>Coming Soon</h1>
        <p>Something amazing is on its way. Stay tuned!</p>
        <div class="stars" aria-hidden="true">🌟🌟🌟</div>
    </div>
    <footer aria-label="Signature">dr.k</footer>
</body>
</html>
