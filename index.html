<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finland 🇫🇮 | kian</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
      padding: 30px;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #0066cc;
    }
    .config {
      background: white;
      border-left: 5px solid #0066cc;
      padding: 12px;
      margin: 10px 0;
      word-break: break-word;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .tag {
      font-weight: bold;
      color: #000;
    }
  </style>
</head>
<body>
  <h1>Finland 🇫🇮 | kian</h1>
  <div id="configs">در حال بارگذاری...</div>

  <script>
    fetch('configs.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('configs');
        container.innerHTML = '';
        data.forEach(item => {
          const div = document.createElement('div');
          div.className = 'config';
          div.innerHTML = `<div class="tag">📍 ${item.type}</div><code>${item.link}</code>`;
          container.appendChild(div);
        });
      })
      .catch(() => {
        document.getElementById('configs').innerText = 'خطا در بارگذاری کانفیگ‌ها.';
      });
  </script>
</body>
</html>
