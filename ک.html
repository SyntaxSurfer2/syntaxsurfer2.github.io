<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>تو یک کونی هستی</title>
    <style>
        body { font-family: Arial, sans-serif; direction: rtl; text-align: right; padding: 20px; }
        #chatBox { height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 15px; background: #f9f9f9; }
        #messageInput { width: 70%; padding: 10px; margin-left: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .message { margin: 5px 0; padding: 10px; background: #e9ecef; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>تو یه کونی هستی</h1>
    <div id="chatBox"></div>
    <input type="text" id="messageInput" placeholder="پیامت رو بنویس...">
    <button onclick="sendMessage()">ارسال</button>

    <script>
        function sendMessage() {
            let input = document.getElementById("messageInput");
            let chatBox = document.getElementById("chatBox");
            let message = input.value;
            if (message) {
                let messageElement = document.createElement("div");
                messageElement.className = "message";
                messageElement.innerText = `تو: ${message}`;
                chatBox.appendChild(messageElement);
                chatBox.scrollTop = chatBox.scrollHeight;
                input.value = "";
            }
        }
        // برای ارسال پیام با Enter
        document.getElementById("messageInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
